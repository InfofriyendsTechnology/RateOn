<div class="rating-stars" [class]="'size-' + size" (mouseleave)="onMouseLeave()">
  <div class="stars">
    <span 
      *ngFor="let star of getStars()"
      class="star-wrapper"
      [class.interactive]="!readonly"
      (click)="onStarClick(star, $event)"
      (mousemove)="onStarHover(star, $event)"
    >
      <!-- Background (empty) star -->
      <span class="star star-empty">★</span>
      <!-- Foreground (filled) star with gradient -->
      <span 
        class="star star-filled"
        [style.width.%]="getStarFillPercentage(star)"
      >★</span>
    </span>
  </div>
  
  <span *ngIf="showCount && reviewCount > 0" class="rating-text">
    {{getRatingText()}}
  </span>
</div>
